## BALANCED memory settings for constrained machines.
## 2GB heap optimized for systems with 15GB total RAM and heavy background usage.
## Reduce parallel workers to prevent memory spike during R8/Proguard processing.
## Use Android Studio's JRE for consistency and to avoid JDK mismatch errors.
org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
org.gradle.java.home=/home/devmahnx/AndroidStudio/android-studio/jbr
org.gradle.daemon=true
org.gradle.workers.max=1
org.gradle.parallel=false
kotlin.daemon.jvmargs=-Xmx1024m
android.useAndroidX=true
android.enableJetifier=true
